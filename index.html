<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Blacklist Scammer Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #d9534f;
            margin-top: 0;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #d9534f;
            outline: none;
        }
        .scammer-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        .scammer-item:last-child {
            border-bottom: none;
        }
        .scammer-name {
            font-weight: bold;
            font-size: 18px;
            color: #111;
        }
        .scammer-game {
            font-size: 14px;
            color: #f0ad4e;
            font-weight: 600;
            margin: 4px 0;
        }
        .scammer-info {
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
        }
        .scammer-meta {
            font-size: 12px;
            color: #888;
            background: #f9f9f9;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .scammer-proof a {
            color: #337ab7;
            text-decoration: none;
            font-weight: bold;
        }
        .scammer-proof a:hover {
            text-decoration: underline;
        }
        .no-result {
            text-align: center;
            color: #999;
            padding: 20px;
            display: none;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 Database Blacklist Scammer</h2>
    <p class="subtitle">Cari nama, kontak, atau informasi penipu secara real-time.</p>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Ketik nama scammer, kontak, atau game..." oninput="searchScammer()" disabled>

    <div id="loadingStatus" class="loading">Menghubungkan ke Google Sheets...</div>
    <div id="scammerList"></div>
    <div id="noResult" class="no-result">Data tidak ditemukan. Tetap waspada!</div>
</div>

<script>
    // Link CSV Google Sheets kamu yang sudah dikonversi untuk export data
    const csvUrl = "https://docs.google.com/spreadsheets/d/1YXbAQGsxEgFmy4oxX8cOeCynRdyoMRjydpxe2HzsyuM/export?format=csv";
    
    let scammerData = [];

    // Fungsi membaca data CSV dan memprosesnya
    async function fetchSheetsData() {
        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            
            // Parsing CSV sederhana (memisahkan berdasarkan baris)
            const rows = csvText.split("\n");
            
            // Looping dimulai dari indeks 1 untuk melewati baris header pertama (baris judul kolom)
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue; // Skip jika baris kosong
                
                // Memisahkan kolom dengan regex agar aman dari koma di dalam tanda kutip teks
                const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 6) {
                    // Membersihkan tanda kutip ganda ekstra jika ada di teks
                    const clean = (text) => text ? text.replace(/^"|"$/g, '').trim() : '';

                    scammerData.push({
                        submissionId: clean(columns[0]),
                        responderId: clean(columns[1]),
                        submittedAt: clean(columns[2]),
                        gameOrAnything: clean(columns[3]), // Kolom "-write anything-"
                        name: clean(columns[4]),           // Scammer Nickname
                        contact: clean(columns[5]),        // Scammer Contact Info
                        evidence: clean(columns[6]),       // Evidence/Proofs
                        reporter: clean(columns[7]),       // Reporter
                        victim: clean(columns[8]),         // Victim
                        times: clean(columns[9])           // Times it happen
                    });
                }
            }

            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('searchInput').disabled = false;
            document.getElementById('searchInput').placeholder = "Ketik nama, game, kontak, atau info...";
            
            renderData(scammerData);

        } catch (error) {
            console.error("Gagal memuat data dari Google Sheets:", error);
            document.getElementById('loadingStatus').innerHTML = "❌ Gagal memuat database. Pastikan akses Google Sheet diatur ke 'Anyone with the link'.";
        }
    }

    const scammerList = document.getElementById('scammerList');
    const noResult = document.getElementById('noResult');

    // Fungsi menampilkan data ke HTML
    function renderData(data) {
        scammerList.innerHTML = "";
        if (data.length === 0) {
            noResult.style.display = "block";
            return;
        }
        noResult.style.display = "none";
        
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'scammer-item';
            
            // Logika untuk menampilkan bukti/evidence jika berupa link/URL
            let evidenceHTML = item.evidence;
            if (item.evidence.startsWith('http://') || item.evidence.startsWith('https://')) {
                evidenceHTML = `<a href="${item.evidence}" target="_blank">Lihat Bukti Foto/Screenshot 🔗</a>`;
            }

            div.innerHTML = `
                <span class="scammer-name">👤 ${item.name || 'Tanpa Nama'}</span>
                <span class="scammer-game">🎮 Game/Kategori: ${item.gameOrAnything || '-'}</span>
                <span class="scammer-info">📞 <strong>Kontak/ID:</strong> ${item.contact || '-'}</span>
                <span class="scammer-info class="scammer-proof"">📂 <strong>Bukti:</strong> ${evidenceHTML || 'Tidak ada bukti terlampir'}</span>
                <div class="scammer-meta">
                    🚨 <strong>Pelapor:</strong> ${item.reporter || 'Anonim'} | 
                    🎯 <strong>Korban:</strong> ${item.victim || '-'} | 
                    📅 <strong>Waktu Kejadian:</strong> ${item.times || '-'}
                </div>
            `;
            scammerList.appendChild(div);
        });
    }

    // Fungsi Pencarian Real-time (Mencari berdasarkan Nama, Kontak, atau Game)
    function searchScammer() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        
        const filteredData = scammerData.filter(item => {
            return (item.name && item.name.toLowerCase().includes(keyword)) || 
                   (item.contact && item.contact.toLowerCase().includes(keyword)) || 
                   (item.gameOrAnything && item.gameOrAnything.toLowerCase().includes(keyword)) ||
                   (item.reporter && item.reporter.toLowerCase().includes(keyword));
        });
        
        renderData(filteredData);
    }

    // Jalankan pengambilan data saat halaman dibuka
    fetchSheetsData();
</script>

</body>
</html>
