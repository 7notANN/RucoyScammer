<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Blacklist Scammer Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #d9534f;
            margin-top: 0;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #d9534f;
            outline: none;
        }
        .scammer-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        .scammer-item:last-child {
            border-bottom: none;
        }
        .scammer-name {
            font-weight: bold;
            font-size: 18px;
            color: #111;
        }
        .scammer-game {
            font-size: 14px;
            color: #f0ad4e;
            font-weight: 600;
            margin: 4px 0;
        }
        .scammer-info {
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
        }
        .scammer-meta {
            font-size: 12px;
            color: #888;
            background: #f9f9f9;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .scammer-proof a {
            color: #337ab7;
            text-decoration: none;
            font-weight: bold;
        }
        .scammer-proof a:hover {
            text-decoration: underline;
        }
        .no-result {
            text-align: center;
            color: #999;
            padding: 20px;
            display: none;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 Database Blacklist Scammer</h2>
    <p class="subtitle">Cari nama, kontak, atau informasi penipu secara real-time.</p>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Ketik nama scammer, kontak, atau game..." oninput="searchScammer()" disabled>

    <div id="loadingStatus" class="loading">Menghubungkan ke Google Sheets...</div>
    <div id="scammerList"></div>
    <div id="noResult" class="no-result">Data tidak ditemukan. Tetap waspada!</div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/1YXbAQGsxEgFmy4oxX8cOeCynRdyoMRjydpxe2HzsyuM/export?format=csv";
    let scammerData = [];

    // Fungsi canggih untuk memisahkan baris CSV dengan aman
    function parseCSV(text) {
        let p = '', r = [];
        let q = false;
        let row = [''];
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') { q = !q; }
            else if (c === ',' && !q) { row.push(''); }
            else if ((c === '\r' || c === '\n') && !q) {
                if (c === '\r' && text[i+1] === '\n') { i++; }
                r.push(row);
                row = [''];
            } else { row[row.length - 1] += c; }
        }
        if (row.length > 1 || row[0] !== '') { r.push(row); }
        return r;
    }

    async function fetchSheetsData() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error("Respons jaringan bermasalah");
            
            const csvText = await response.text();
            const rows = parseCSV(csvText);
            
            // Loop dimulai dari indeks 1 (melewati baris header atas)
            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i];
                
                // Pastikan kolom terisi minimal sampai data kontak
                if (columns.length >= 6) {
                    scammerData.push({
                        submissionId: columns[0] ? columns[0].trim() : '',
                        responderId: columns[1] ? columns[1].trim() : '',
                        submittedAt: columns[2] ? columns[2].trim() : '',
                        gameOrAnything: columns[3] ? columns[3].trim() : '', 
                        name: columns[4] ? columns[4].trim() : '',           
                        contact: columns[5] ? columns[5].trim() : '',        
                        evidence: columns[6] ? columns[6].trim() : '',       
                        reporter: columns[7] ? columns[7].trim() : '',       
                        victim: columns[8] ? columns[8].trim() : '',         
                        times: columns[9] ? columns[9].trim() : ''           
                    });
                }
            }

            // Sembunyikan loading status jika data berhasil dimuat
            document.getElementById('loadingStatus').style.display = 'none';
            document.getElementById('searchInput').disabled = false;
            document.getElementById('searchInput').placeholder = "Ketik nama, game, kontak, atau info...";
            
            renderData(scammerData);

        } catch (error) {
            console.error("Gagal memuat data dari Google Sheets:", error);
            document.getElementById('loadingStatus').innerHTML = "❌ Gagal memuat database. Pastikan akses Google Sheet diatur ke 'Anyone with the link'.";
        }
    }

    const scammerList = document.getElementById('scammerList');
    const noResult = document.getElementById('noResult');

    function renderData(data) {
        scammerList.innerHTML = "";
        if (data.length === 0) {
            noResult.style.display = "block";
            return;
        }
        noResult.style.display = "none";
        
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'scammer-item';
            
            let evidenceHTML = item.evidence;
            if (item.evidence.startsWith('http://') || item.evidence.startsWith('https://')) {
                evidenceHTML = `<a href="${item.evidence}" target="_blank">Lihat Bukti Foto/Screenshot 🔗</a>`;
            }

            div.innerHTML = `
                <span class="scammer-name">👤 ${item.name || 'Tanpa Nama'}</span>
                <span class="scammer-game">🎮 Game/Kategori: ${item.gameOrAnything || '-'}</span>
                <span class="scammer-info">📞 <strong>Kontak/ID:</strong> ${item.contact || '-'}</span>
                <span class="scammer-info">📂 <strong>Bukti:</strong> ${evidenceHTML || 'Tidak ada bukti terlampir'}</span>
                <div class="scammer-meta">
                    🚨 <strong>Pelapor:</strong> ${item.reporter || 'Anonim'} | 
                    🎯 <strong>Korban:</strong> ${item.victim || '-'} | 
                    📅 <strong>Waktu Kejadian:</strong> ${item.times || '-'}
                </div>
            `;
            scammerList.appendChild(div);
        });
    }

    function searchScammer() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filteredData = scammerData.filter(item => {
            return (item.name && item.name.toLowerCase().includes(keyword)) || 
                   (item.contact && item.contact.toLowerCase().includes(keyword)) || 
                   (item.gameOrAnything && item.gameOrAnything.toLowerCase().includes(keyword));
        });
        renderData(filteredData);
    }

    fetchSheetsData();
</script>

</body>
</html>
